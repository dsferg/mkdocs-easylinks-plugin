site_name: EasyLinks Example
site_description: Example site demonstrating the EasyLinks plugin

theme:
  name: material
  palette:
    primary: indigo

plugins:
  - search
  - easylinks:
      warn_on_missing: true
      warn_on_ambiguous: true
      ignore_files:
        # Example: ignore draft and template files
        # - draft.md
        # - "draft-*.md"    # Glob pattern
        # - "*.tmp"         # All temp files
      exclude_dirs:
        # Example: exclude entire directories
        # - drafts/
        # - templates/
      show_stats: false  # Set to true to see link statistics

nav:
  - Home: index.md
  - Guides:
    - Getting Started: guides/getting-started.md
    - Advanced: guides/advanced.md
    - Examples: guides/examples.md
    - Admonitions: guides/admonitions.md
    - Ignoring Files: guides/ignore-files-example.md
    - Excluding Directories: guides/exclude-directories.md
    - Statistics: guides/statistics.md
  - Reference:
    - API: reference/api.md
    - Configuration: reference/configuration.md
    - Images Guide: reference/images-guide.md
